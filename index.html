<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Weather Dashboard</title>

    <link
        rel="stylesheet"
        href="css/styles.css">
</head>

<body>

    <!-- Header -->

    <header class="header">

        <div class="header__logo">
            <h1>Weather Dashboard</h1>
        </div>

        <button
            id="themeButton"
            class="header__button">

            🌙

        </button>

    </header>

    <!-- Search Section -->

    <section class="search">

        <div class="search__container">

            <input
                type="text"
                id="cityInput"
                class="search__input"
                placeholder="Enter city name">

            <button
                id="searchButton"
                class="search__button">

                Search

            </button>

        </div>

    </section>

    <!-- Loading -->

    <section
        id="loading"
        class="loading">

        <p>

            Loading Weather Data...

        </p>

    </section>

    <!-- Error Message -->

    <section
        id="errorContainer"
        class="error">

        <p id="errorMessage">

        </p>

    </section>

    <!-- Current Weather -->

    <section
        class="current-weather">

        <h2>

            Current Weather

        </h2>

        <div
            id="weatherCard"
            class="weather-card">

            <h3 id="cityName">

                City

            </h3>

            <p id="temperature">

                Temperature

            </p>

            <p id="description">

                Description

            </p>

            <p id="humidity">

                Humidity

            </p>

            <p id="windSpeed">

                Wind Speed

            </p>

        </div>

    </section>

    <!-- Forecast -->

    <section
        class="forecast">

        <h2>

            5-Day Forecast

        </h2>

        <div
            id="forecastContainer"
            class="forecast-grid">

        </div>

    </section>

    <!-- Favorite City -->

    <section
        class="favorite">

        <h2>

            Favorite City

        </h2>

        <button
            id="saveFavoriteButton"
            class="favorite__button">

            Save Current City

        </button>

        <p
            id="favoriteCity">

            No favorite city selected.

        </p>

    </section>

    <!-- Footer -->

    <footer class="footer">

        <p>

            © 2026 Weather Dashboard

        </p>

    </footer>

    <!-- JavaScript -->

    <script src="js/storage.js"></script>

    <script src="js/api.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
